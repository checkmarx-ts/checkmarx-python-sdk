name: Upload Python Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write


jobs:
  deploy:

    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: '3.7.17'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Build Package
      run: |
        pip install --upgrade pip build
        python -m build
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@f5622bde02b04381239da3573277701ceca8f6a0 # v1.8.7
      with:
        password: ${{ secrets.Checkmarx_Python_SDK_PYPI_PASSWORD }}
        attestations: false 
    - name: Release
      env:
        GITHUB_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
      run: >-
        gh release create ${{ github.ref_name }} ${{ github.workspace }}/dist/* --generate-notes --title "Version ${{ github.ref_name }}"
